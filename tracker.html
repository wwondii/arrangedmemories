<!--CLAUDE AI: received assistance in creating a tracker for detecting ArUco markers. ALL code was generated by CLAUDE AI-->

<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: monospace; color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 10px; }
h1 { font-size: 14px; color: #666; font-weight: normal; }
#cam-container { position: relative; width: 640px; height: 480px; background: #000; }
video { width: 100%; height: 100%; }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
button { padding: 6px 18px; font-size: 12px; font-family: monospace; background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
button.on { background: #2a3a2a; color: #8c8; border-color: #484; }
select { padding: 5px 10px; font-size: 12px; font-family: monospace; background: #222; color: #ccc; border: 1px solid #555; border-radius: 3px; max-width: 280px; }
#info { font-size: 11px; color: #555; }
#info span.ok { color: #8c8; }
#grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; width: 640px; }
.card { background: #1a1a1a; border: 1px solid #222; padding: 6px 8px; font-size: 10px; }
.card.on { border-color: #484; background: #1a2a1a; color: #8c8; }
label { font-size: 11px; color: #666; }
.hint { font-size: 10px; color: #555; text-align: center; width: 640px; line-height: 1.6; }
</style>
</head>
<body>
<h1>ARuco Tracker — Perspective Calibration</h1>
<div id="cam-container">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
</div>
<p class="hint">
  Drag the 4 <span style="color:#f80">orange corners</span> to match the 4 corners of your projected play area on the wall.<br>
  Top-left → Top-right → Bottom-right → Bottom-left. Markers outside the quadrilateral are ignored.
</p>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
  <label for="camSelect">Camera:</label>
  <select id="camSelect"><option value="">— select a camera —</option></select>
  <button id="camBtn">Start camera</button>
  <button id="bcBtn">Connect to game</button>
  <button id="resetCorners">Reset corners</button>
</div>
<span id="info">camera off · game disconnected</span>
<div id="grid"></div>
<button id="refreshCams" style="margin-top:8px;">Refresh cameras</button>

<script>
const LABELS = ['Strip A','Strip B','Strip C','Strip D','Strip E','Polaroid 1','Polaroid 2','Polaroid 3'];
const grid = document.getElementById('grid');
LABELS.forEach((l,id) => {
  const d = document.createElement('div');
  d.className='card'; d.id='c'+id;
  d.textContent=`ID ${id} — ${l}`;
  grid.appendChild(d);
});

const vid = document.getElementById('vid');
const cv  = document.getElementById('cv');
const olCtx = cv.getContext('2d');
const info = document.getElementById('info');
const camSelect = document.getElementById('camSelect');
let cameraOn=false, bc=null, detector=null, animId=null;

// ── 4 corner points (in mirrored display space 0-640, 0-480) ─────
// Order: TL, TR, BR, BL
let corners = [
  { x: 80,  y: 40  },  // TL
  { x: 560, y: 40  },  // TR
  { x: 560, y: 440 },  // BR
  { x: 80,  y: 440 },  // BL
];
const CORNER_COLOURS = ['#ff8800','#00ff88','#0088ff','#ff0088'];
const CORNER_LABELS  = ['TL','TR','BR','BL'];
let draggingCorner = null;

cv.addEventListener('mousedown', e => {
  const rect = cv.getBoundingClientRect();
  const mx = mirrorX((e.clientX - rect.left) * (640/rect.width));
  const my = (e.clientY - rect.top) * (480/rect.height);
  let closest = null, minDist = 20;
  corners.forEach((c,i) => {
    const d = Math.sqrt((mx-c.x)**2+(my-c.y)**2);
    if (d < minDist) { minDist=d; closest=i; }
  });
  draggingCorner = closest;
});

window.addEventListener('mousemove', e => {
  if (draggingCorner === null) return;
  const rect = cv.getBoundingClientRect();
  const mx = Math.max(0,Math.min(640, mirrorX((e.clientX-rect.left)*(640/rect.width))));
  const my = Math.max(0,Math.min(480, (e.clientY-rect.top)*(480/rect.height)));
  corners[draggingCorner] = { x:mx, y:my };
});
window.addEventListener('mouseup', () => draggingCorner = null);

let mirrored = true;
function mirrorX(x){ return 640-x; }

document.getElementById('resetCorners').addEventListener('click', () => {
  corners = [{x:80,y:40},{x:560,y:40},{x:560,y:440},{x:80,y:440}];
});

// ── Perspective transform ─────────────────────────────────────────
// Given a point (px,py) inside the quadrilateral defined by corners,
// return normalised (0-1) coordinates relative to that quad
function perspectiveTransform(px, py) {
  // Use bilinear interpolation as approximation
  const [tl,tr,br,bl] = corners;

  // Find s,t such that point = lerp(lerp(tl,tr,s), lerp(bl,br,s), t)
  // Solve iteratively
  let s=0.5, t=0.5;
  for (let i=0; i<10; i++) {
    const topX = tl.x + (tr.x-tl.x)*s;
    const topY = tl.y + (tr.y-tl.y)*s;
    const botX = bl.x + (br.x-bl.x)*s;
    const botY = bl.y + (br.y-bl.y)*s;
    const curX = topX + (botX-topX)*t;
    const curY = topY + (botY-topY)*t;
    // Adjust s based on x error
    const dxds = (tr.x-tl.x)*(1-t)+(br.x-bl.x)*t;
    const dyds = (tr.y-tl.y)*(1-t)+(br.y-bl.y)*t;
    // Adjust t based on y error
    const dxdt = (bl.x-tl.x)*(1-s)+(br.x-tr.x)*s;
    const dydt = (bl.y-tl.y)*(1-s)+(br.y-tr.y)*s;
    s += ((px-curX)*dxds+(py-curY)*dyds)/(dxds*dxds+dyds*dyds+0.001)*0.5;
    t += ((px-curX)*dxdt+(py-curY)*dydt)/(dxdt*dxdt+dydt*dydt+0.001)*0.5;
    s = Math.max(0,Math.min(1,s));
    t = Math.max(0,Math.min(1,t));
  }
  return { x:s, y:t };
}

function pointInQuad(px, py) {
  const [tl,tr,br,bl] = corners;
  function cross(ax,ay,bx,by,cx,cy){ return (bx-ax)*(cy-ay)-(by-ay)*(cx-ax); }
  return cross(tl.x,tl.y,tr.x,tr.y,px,py)>=0 &&
         cross(tr.x,tr.y,br.x,br.y,px,py)>=0 &&
         cross(br.x,br.y,bl.x,bl.y,px,py)>=0 &&
         cross(bl.x,bl.y,tl.x,tl.y,px,py)>=0;
}

// Load ARuco
const cvScript = document.createElement('script');
cvScript.src = 'cv.js';
document.head.appendChild(cvScript);
cvScript.onload = () => {
  const arScript = document.createElement('script');
  arScript.src = 'aruco.js';
  document.head.appendChild(arScript);
};

async function populateCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cameras = devices.filter(d=>d.kind==='videoinput');
    camSelect.innerHTML = '<option value="">— select a camera —</option>';
    cameras.forEach((cam,i) => {
      const opt = document.createElement('option');
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `Camera ${i+1}`;
      if (cam.label.toLowerCase().includes('camo')) opt.selected=true;
      camSelect.appendChild(opt);
    });
  } catch(e) { info.innerHTML=`<span style="color:#c44">permission denied</span>`; }
}
populateCameras();
navigator.mediaDevices.addEventListener('devicechange', populateCameras);
document.getElementById('refreshCams').addEventListener('click', populateCameras);

document.getElementById('camBtn').addEventListener('click', async function() {
  if (cameraOn) {
    vid.srcObject?.getTracks().forEach(t=>t.stop());
    vid.srcObject=null; cameraOn=false; cancelAnimationFrame(animId);
    this.textContent='Start camera'; this.classList.remove('on');
    updateInfo(); return;
  }
  const deviceId = camSelect.value;
  const constraints = { video: deviceId?{deviceId:{exact:deviceId},width:640,height:480}:{width:640,height:480}, audio:false };
  try {
    vid.srcObject = await navigator.mediaDevices.getUserMedia(constraints);
    await new Promise(r=>vid.onloadedmetadata=r); vid.play();
    cv.width=640; cv.height=480; cameraOn=true;
    this.textContent='Stop camera'; this.classList.add('on');
    await new Promise(r=>{ const t=setInterval(()=>{ if(typeof AR!=='undefined'){clearInterval(t);r();} },100); });
    detector = new AR.Detector({ dictionaryName:'ARUCO' });
    updateInfo(); detect();
  } catch(e) { info.innerHTML=`<span style="color:#c44">camera error: ${e.message}</span>`; }
});

document.getElementById('bcBtn').addEventListener('click', function() {
  if (bc){ bc.close(); bc=null; this.textContent='Connect to game'; this.classList.remove('on'); }
  else { bc=new BroadcastChannel('aruco-tracker'); this.textContent='Disconnect'; this.classList.add('on'); }
  updateInfo();
});

function updateInfo() {
  const cam = cameraOn?`<span style="color:#8c8">camera on</span>`:'camera off';
  const game = bc?'<span style="color:#8c8">game connected</span>':'game disconnected';
  info.innerHTML=`${cam} · ${game}`;
}

function detect() {
  if (!cameraOn) return;
  const tmp = document.createElement('canvas');
  tmp.width=640; tmp.height=480;
  tmp.getContext('2d').drawImage(vid,0,0,640,480);
  let markers=[];
  try { markers=detector.detect(tmp.getContext('2d').getImageData(0,0,640,480)); } catch(e){}

  olCtx.clearRect(0,0,640,480);

  // Draw calibration quad
  olCtx.strokeStyle='rgba(255,136,0,0.7)'; olCtx.lineWidth=1.5;
  olCtx.beginPath();
  corners.forEach((c,i) => { i===0?olCtx.moveTo(mirrorX(c.x),c.y):olCtx.lineTo(mirrorX(c.x),c.y); });
  olCtx.closePath(); olCtx.stroke();

  // Draw corner handles
  corners.forEach((c,i) => {
    olCtx.fillStyle=CORNER_COLOURS[i];
    olCtx.beginPath();
    olCtx.arc(mirrorX(c.x), c.y, 8, 0, Math.PI*2);
    olCtx.fill();
    olCtx.fillStyle='#000';
    olCtx.font='bold 10px monospace';
    olCtx.textAlign='center';
    olCtx.fillText(CORNER_LABELS[i], mirrorX(c.x), c.y+4);
  });

  const positions={};
  const seen=new Set();

  markers.forEach(m => {
    if (m.id<0||m.id>7) return;
    const cx = Math.round(mirrorX(m.corners.reduce((s,c)=>s+c.x,0)/4));
    const cy = Math.round(m.corners.reduce((s,c)=>s+c.y,0)/4);

    if (!pointInQuad(cx,cy)) return;
    seen.add(m.id);
    const norm = perspectiveTransform(cx, cy);
    positions[m.id] = { x: 1 - norm.x, y: norm.y };

    olCtx.strokeStyle='#4c4'; olCtx.lineWidth=2;
    olCtx.beginPath();
    m.corners.forEach((c,i)=>{ const x=mirrorX(c.x); i===0?olCtx.moveTo(x,c.y):olCtx.lineTo(x,c.y); });
    olCtx.closePath(); olCtx.stroke();
    olCtx.fillStyle='#4c4'; olCtx.font='bold 12px monospace';
    olCtx.textAlign='left';
    olCtx.fillText(`${m.id} ${LABELS[m.id]}`, cx-20, cy-10);
  });

  LABELS.forEach((_,id) => {
    document.getElementById('c'+id).className='card'+(seen.has(id)?' on':'');
  });

  if (bc && Object.keys(positions).length>0)
    bc.postMessage({ type:'markers', positions });

  animId=requestAnimationFrame(detect);
}
</script>
</body>
</html>
